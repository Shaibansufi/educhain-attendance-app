name: Flutter iOS Build

on:
  push:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.13.0"  # Use a specific stable version, not "stable"
          channel: "stable"

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 4️⃣ Build iOS (release, no code signing)
      - name: Build iOS
        run: flutter build ios --release --no-codesign

      # 5️⃣ Package Runner.app as zip
      - name: Package .app as zip
        run: |
          cd build/ios/iphoneos
          zip -r ../../ios-build.zip Runner.app

      # 6️⃣ Upload artifact
      - name: Upload iOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/ios-build.zip
