name: Flutter iOS Build

on:
  push:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-latest

    defaults:
      run:
        working-directory: decentralized_attendance

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Install Flutter 3.13.6 manually
      - name: Install Flutter 3.13.6
        run: |
          curl -L https://storage.googleapis.com/flutter_infra_release/releases/stable/macos/flutter_macos_3.13.6-stable.zip -o flutter.zip
          unzip flutter.zip -d $HOME
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      # 3️⃣ Verify Flutter & Dart versions
      - name: Flutter & Dart version
        run: |
          flutter --version
          dart --version

      # 4️⃣ Disable Flutter Analytics
      - name: Disable Flutter Analytics
        run: flutter config --no-analytics

      # 5️⃣ Install project dependencies
      - name: Flutter pub get
        run: flutter pub get

      # 6️⃣ Build iOS release (no code signing)
      - name: Build iOS
        run: flutter build ios --release --no-codesign

      # 7️⃣ Package Runner.app as zip
      - name: Package Runner.app
        run: |
          cd build/ios/iphoneos
          zip -r ../../ios-build.zip Runner.app

      # 8️⃣ Create .ipa from Runner.app
      - name: Package .ipa
        run: |
          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          zip -r ios-build.ipa Payload
          rm -rf Payload

      # 9️⃣ Upload artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: |
            build/ios/ios-build.zip
            build/ios/ios-build.ipa