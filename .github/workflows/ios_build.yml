name: Flutter iOS Build

on:
  push:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-latest

    defaults:
      run:
        working-directory: decentralized_attendance

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup Flutter 3.13.6 (comes with Dart 3.11+)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.13.6
          channel: stable

      # 3️⃣ Verify Flutter & Dart versions
      - name: Flutter and Dart versions
        run: |
          flutter --version
          dart --version

      # 4️⃣ Cache Flutter dependencies
      - name: Cache Flutter dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.pub-cache
            decentralized_attendance/.dart_tool
          key: flutter-deps-${{ hashFiles('decentralized_attendance/pubspec.yaml') }}
          restore-keys: |
            flutter-deps-

      # 5️⃣ Install dependencies
      - name: Get Flutter dependencies
        run: flutter pub get

      # 6️⃣ Build iOS release (no codesign)
      - name: Build iOS
        run: flutter build ios --release --no-codesign

      # 7️⃣ Package Runner.app as zip
      - name: Package Runner.app
        run: |
          cd build/ios/iphoneos
          zip -r ../../ios-build.zip Runner.app

      # 8️⃣ Create .ipa from Runner.app
      - name: Package .ipa
        run: |
          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          zip -r ios-build.ipa Payload
          rm -rf Payload

      # 9️⃣ Upload artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: |
            build/ios/ios-build.zip
            build/ios/ios-build.ipa