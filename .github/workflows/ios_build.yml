name: Flutter iOS Build

on:
  push:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-latest

    defaults:
      run:
        working-directory: decentralized_attendance

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Download Flutter 3.13.6 manually
      - name: Download Flutter SDK
        run: |
          curl -L https://storage.googleapis.com/flutter_infra_release/releases/stable/macos/flutter_macos_3.13.6-stable.zip -o flutter.zip
          unzip flutter.zip
          export PATH="$PWD/flutter/bin:$PATH"
          flutter --version
          dart --version

      # Get dependencies
      - name: Get dependencies
        run: flutter pub get

      # Build iOS
      - name: Build iOS
        run: flutter build ios --release --no-codesign

      # Package Runner.app
      - name: Package Runner.app
        run: |
          cd build/ios/iphoneos
          zip -r ../../ios-build.zip Runner.app

      # Upload artifact
      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/ios-build.zip