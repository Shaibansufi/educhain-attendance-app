name: Flutter iOS Build

on:
  push:
    branches:
      - main  # Trigger on pushes to main branch

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # 1️⃣ Checkout your repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "stable"

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 4️⃣ Build iOS app (no codesign)
      - name: Build iOS (release, no code signing)
        run: flutter build ios --release --no-codesign

      # 5️⃣ Package the Runner.app as zip
      - name: Package .app as zip
        run: |
          cd build/ios/iphoneos
          zip -r ../../ios-build.zip Runner.app

      # 6️⃣ Upload the zip as workflow artifact
      - name: Upload iOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/ios-build.zip